        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-10%); animation-timing-function: cubic-bezier(0.8,0,1,1); }

        }
        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }

        }

        const getSpellingHint = (text) => {
          if (!text) return "";
          const trimmed = text.trim();
          if (trimmed.length <= 2) return trimmed; 

          const firstChar = trimmed[0];
          const lastChar = trimmed[trimmed.length - 1];
          
          let mask = "";
          for (let i = 1; i < trimmed.length - 1; i++) {
             const char = trimmed[i];
             if (/[a-zA-Z0-9]/.test(char)) {
                 mask += " _ "; 
             } else {
                 mask += ` ${char} `; 
             }
          }
          
          return `${firstChar}${mask}${lastChar}`;
        };

        // 修改：加入 onSuccess Callback 支援挑戰模式
        const SpeechEvaluator = ({ targetText, onSuccess }) => {
          const [isListening, setIsListening] = useState(false);
          const [result, setResult] = useState('idle');
          const [transcript, setTranscript] = useState('');
          const timeoutRef = useRef(null);
          const recognitionRef = useRef(null);

          const getLevenshteinDistance = (a, b) => {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                    }
                }
            }
            return matrix[b.length][a.length];
          };

          const numberMap = {
            "0": "zero", "1": "one", "2": "two", "3": "three", "4": "four", "5": "five",
            "6": "six", "7": "seven", "8": "eight", "9": "nine", "10": "ten",
            "11": "eleven", "12": "twelve", "13": "thirteen", "14": "fourteen", "15": "fifteen",
            "16": "sixteen", "17": "seventeen", "18": "eighteen", "19": "nineteen", "20": "twenty",
            "30": "thirty", "40": "forty", "50": "fifty", "60": "sixty", "70": "seventy", "80": "eighty", "90": "ninety",
            "100": "hundred"
          };

          const normalizeText = (text) => {
             let str = text.toLowerCase().replace(/[.,?!]/g, '').trim();
             str = str.split(' ').map(word => numberMap[word] || word).join(' ');
             str = str.replace("it's", "it is").replace("i'm", "i am").replace("what's", "what is");
             return str;
          }

          useEffect(() => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
              recognitionRef.current = new SpeechRecognition();
              recognitionRef.current.continuous = false;
              recognitionRef.current.lang = 'en-US';
              recognitionRef.current.interimResults = false;

              recognitionRef.current.onresult = (event) => {
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                const spokenText = event.results[0][0].transcript;
                setTranscript(spokenText);
                evaluate(spokenText, targetText);
                setIsListening(false);
              };

              recognitionRef.current.onerror = (event) => {
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                console.error("Speech error", event.error);
                setResult('error');
                setIsListening(false);
              };

              recognitionRef.current.onend = () => {
                if (isListening) setIsListening(false);
              };
            }
            return () => {
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
            }
          }, [targetText]);

          const startListening = (e) => {
            if (e) e.stopPropagation();
            if (!recognitionRef.current) {
                alert("您的瀏覽器不支援語音辨識功能 (請使用 Chrome 或 Edge)");
                return;
            }
            setResult('listening');
            setTranscript('...');
            setIsListening(true);
            recognitionRef.current.start();

            if (timeoutRef.current) clearTimeout(timeoutRef.current);
            timeoutRef.current = setTimeout(() => {
                if (recognitionRef.current) recognitionRef.current.stop();
                setResult('error');
                setIsListening(false);
            }, 5000);
          };

          const stopListening = (e) => {
            if (e) e.stopPropagation();
            if (recognitionRef.current) {
              recognitionRef.current.stop();
            }
            if (timeoutRef.current) clearTimeout(timeoutRef.current);
          };

          const evaluate = (spoken, target) => {
            const s = normalizeText(spoken);
            const t = normalizeText(target);

            if (s === t || t.includes(s) || s.includes(t)) {
              setResult('success');
              if (onSuccess) onSuccess(); // 通知父組件
              return;
            }

            const distance = getLevenshteinDistance(s, t);
            const maxLength = Math.max(s.length, t.length);
            const similarity = 1 - (distance / maxLength);

            if (similarity > 0.8) {
                setResult('success');
                if (onSuccess) onSuccess(); // 通知父組件
            } else {
                setResult('fail');
            }
          };

          // 讓外部可以重置狀態
          useEffect(() => {
              setResult('idle');
              setTranscript('');
          }, [targetText]);

          return (
            <div className="mt-3 border-t pt-2">
              <div className="flex items-center justify-between mb-2">
                <div className="flex-1">
                    {result === 'listening' && <span className="text-sky-500 text-sm animate-pulse">正在聆聽...</span>}
                    {result === 'success' && <span className="text-green-600 font-bold flex items-center gap-1"><Icons.Star size={14} fill="currentColor"/> Perfect!</span>}
                    {result === 'good' && <span className="text-orange-500 font-bold">Good! ({transcript})</span>}
                    {result === 'error' && <span className="text-red-400 text-xs">沒聽到聲音，請再試一次</span>}
                    {result === 'idle' && <span className="text-gray-400 text-xs">點擊麥克風練習發音</span>}
                </div>
                
                <button 
                    onClick={isListening ? stopListening : startListening}
                    className={`p-3 rounded-full transition-all shadow-sm ${
                    isListening 
                        ? 'bg-red-500 text-white animate-pulse' 
                        : result === 'success' 
                            ? 'bg-green-100 text-green-600 hover:bg-green-200'
                            : 'bg-gray-100 text-gray-500 hover:bg-sky-100 hover:text-sky-500'
                    }`}
                >
                    {isListening ? <Icons.MicOff size={20} /> : <Icons.Mic size={20} />}
                </button>
              </div>

              {result === 'fail' && (
                  <CorrectionDisplay target={targetText} spoken={transcript} />
              )}
            </div>
          );
        };

        const App = () => {
          // Global State
          const [mode, setMode] = useState('menu'); // menu, learn, game, spelling, challenge_select, challenge_play
          const [currentGrade, setCurrentGrade] = useState(null);
          const [currentTopic, setCurrentTopic] = useState(null);
          const [speakingItem, setSpeakingItem] = useState(null);

          // Game State
          const [gameCards, setGameCards] = useState([]);
          const [selectedCards, setSelectedCards] = useState([]);
          const [matchedPairs, setMatchedPairs] = useState([]);
          const [isWrong, setIsWrong] = useState(false);

          // Spelling State
          const [spellingQueue, setSpellingQueue] = useState([]);
          const [spellingIndex, setSpellingIndex] = useState(0);
          const [userSpelling, setUserSpelling] = useState('');
          const [spellingFeedback, setSpellingFeedback] = useState('idle');
          const [spellingStats, setSpellingStats] = useState({ correct: 0, total: 0 });
          const [scrambleParts, setScrambleParts] = useState({ available: [], placed: [] });

          // Challenge State
          const [challengeGrade, setChallengeGrade] = useState('');
          const [challengeQuestions, setChallengeQuestions] = useState([]);
          const [challengeIndex, setChallengeIndex] = useState(0);
          const [challengeScore, setChallengeScore] = useState(0);
          // 用於挑戰模式內的拼寫邏輯
          const [chUserSpelling, setChUserSpelling] = useState('');
          const [chFeedback, setChFeedback] = useState('idle');
          const [chScrambleParts, setChScrambleParts] = useState({ available: [], placed: [] });

          // --- 核心語音功能 ---
          const speak = (text) => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              
              let textToSpeak = text
                .replace(/I'm/g, "I am").replace(/What's/g, "What is").replace(/It's/g, "It is")
                .replace(/You're/g, "You are").replace(/He's/g, "He is").replace(/She's/g, "She is")
                .replace(/They're/g, "They are").replace(/Where's/g, "Where is").replace(/don't/g, "do not")
                .replace(/doesn't/g, "does not").replace(/can't/g, "cannot").replace(/isn't/g, "is not");

              if (text === 'I') textToSpeak = "Eye"; 
              textToSpeak = textToSpeak.replace(/[.,?!]/g, ", ");

              const utterance = new SpeechSynthesisUtterance(textToSpeak);
              utterance.lang = 'en-US'; 
              utterance.rate = 0.85;
              utterance.pitch = 1.0; 
              
              setSpeakingItem(text);
              utterance.onend = () => setSpeakingItem(null);
              window.speechSynthesis.speak(utterance);
            }
          };

          // --- 各模式初始化 ---
          const initGame = (grade, topic) => {
            const items = curriculumData[grade][topic];
            let cards = items.flatMap((item, index) => [
              { id: `en-${index}`, content: item.en, type: 'en', pairId: index },
              { id: `zh-${index}`, content: item.zh, type: 'zh', pairId: index }
            ]);
            cards = cards.sort(() => Math.random() - 0.5);
            setGameCards(cards);
            setMatchedPairs([]);
            setSelectedCards([]);
            setIsWrong(false);
            setMode('game');
          };

          const initSpelling = (grade, topic) => {
            const items = [...curriculumData[grade][topic]];
            const shuffled = items.sort(() => Math.random() - 0.5);
            setSpellingQueue(shuffled);
            setSpellingIndex(0);
            setUserSpelling('');
            setSpellingFeedback('idle');
            setSpellingStats({ correct: 0, total: 0 });
            setMode('spelling');
          };

          const initChallenge = (grade) => {
            setChallengeGrade(grade);
            let items = [];
            
            if (grade === 'ALL') {
                Object.values(curriculumData).forEach(g => {
                    Object.values(g).forEach(t => items.push(...t));
                });
            } else {
                Object.values(curriculumData[grade]).forEach(t => items.push(...t));
            }
            
            // 先將所有題目打亂
            let shuffled = [...items].sort(() => Math.random() - 0.5);
            
            // 將題目分為「單字」(不含空格) 與「句子」(含空格) 兩組
            let words = shuffled.filter(item => !item.en.includes(' '));
            let sentences = shuffled.filter(item => item.en.includes(' '));
            
            let spellItems = [];
            let speakItems = [];

            // 確保拼寫題(Spell)至少有 1 個單字和 1 個句子
            if (words.length > 0) spellItems.push(words.pop());
            if (sentences.length > 0) spellItems.push(sentences.pop());

            // 將剩下的題目合併並再次打亂
            let remaining = [...words, ...sentences].sort(() => Math.random() - 0.5);

            // 補齊拼寫題到 6 題
            while (spellItems.length < 6 && remaining.length > 0) {
                spellItems.push(remaining.pop());
            }

            // 補齊口說題到 4 題
            while (speakItems.length < 4 && remaining.length > 0) {
                speakItems.push(remaining.pop());
            }

            // 加上題型標籤
            spellItems = spellItems.map(item => ({ ...item, type: 'spell' }));
            speakItems = speakItems.map(item => ({ ...item, type: 'speak' }));
            
            // 將 10 題合併並打亂出題順序
            const questions = [...spellItems, ...speakItems].sort(() => Math.random() - 0.5);
            
            setChallengeQuestions(questions);
            setChallengeIndex(0);
            setChallengeScore(0);
            setChFeedback('idle');
            setMode('challenge_play');
          };

          // --- 拼寫模式邏輯 ---
          useEffect(() => {
            if (mode === 'spelling' && spellingQueue.length > 0 && spellingIndex < spellingQueue.length) {
                const currentText = spellingQueue[spellingIndex].en;
                if (currentText.includes(' ')) {
                    const parts = currentText.split(' ');
                    setScrambleParts({ available: [...parts].sort(() => Math.random() - 0.5), placed: [] });
                }
                setUserSpelling('');
                setSpellingFeedback('idle');
            }
          }, [spellingIndex, spellingQueue, mode]);

          // --- 綜合挑戰模式邏輯 ---
          useEffect(() => {
              if (mode === 'challenge_play' && challengeQuestions.length > 0 && challengeIndex < 10) {
                  const q = challengeQuestions[challengeIndex];
                  setChFeedback('idle');
                  setChUserSpelling('');
                  if (q.type === 'spell' && q.en.includes(' ')) {
                      const parts = q.en.split(' ');
                      setChScrambleParts({ available: [...parts].sort(() => Math.random() - 0.5), placed: [] });
                  }
              }
          }, [challengeIndex, challengeQuestions, mode]);

          const nextChallengeQuestion = (isCorrect) => {
              if (isCorrect) {
                  setChallengeScore(prev => prev + 1);
              }
              setChallengeIndex(prev => prev + 1);
          };

          // 挑戰模式的拼寫檢查
          const checkChallengeSpelling = () => {
              const currentItem = challengeQuestions[challengeIndex];
              const cleanUser = chUserSpelling.trim().toLowerCase();
              const cleanTarget = currentItem.en.trim().toLowerCase();
              
              if (cleanUser === cleanTarget) {
                  setChFeedback('correct');
                  speak("Correct! " + (currentItem.en === 'I' ? 'Eye' : currentItem.en));
                  setTimeout(() => nextChallengeQuestion(true), 1500);
              } else {
                  setChFeedback('wrong');
                  speak("Try again.");
              }
          };

          // 挑戰模式的重組選擇
          const handleChallengeScrambleSelect = (word, index) => {
            if (chFeedback === 'correct') return;
            const newAvailable = [...chScrambleParts.available];
            newAvailable.splice(index, 1);
            const newPlaced = [...chScrambleParts.placed, word];
            setChScrambleParts({ available: newAvailable, placed: newPlaced });

            const currentTarget = challengeQuestions[challengeIndex].en;
            if (newPlaced.length === currentTarget.split(' ').length) {
                if (newPlaced.join(' ') === currentTarget) {
                    setChFeedback('correct');
                    speak("Correct!");
                    setTimeout(() => nextChallengeQuestion(true), 1500);
                } else {
                    setChFeedback('wrong');
                    speak("Try again.");
                }
            }
          };
          const handleChallengeScrambleDeselect = (word, index) => {
            if (chFeedback === 'correct') return;
            const newPlaced = [...chScrambleParts.placed];
            newPlaced.splice(index, 1);
            const newAvailable = [...chScrambleParts.available, word];
            setChScrambleParts({ available: newAvailable, placed: newPlaced });
            setChFeedback('idle');
          };

          // 一般拼寫模式的檢查與重組
          const checkWordSpelling = () => {
            const currentItem = spellingQueue[spellingIndex];
            const cleanUser = userSpelling.trim().toLowerCase();
            const cleanTarget = currentItem.en.trim().toLowerCase();
            
            if (cleanUser === cleanTarget) {
              setSpellingFeedback('correct');
              speak("Correct! " + (currentItem.en === 'I' ? 'Eye' : currentItem.en));
              setSpellingStats(prev => ({ ...prev, correct: prev.correct + 1 }));
            } else {
              setSpellingFeedback('wrong');
              speak("Try again.");
            }
          };
          const handleScrambleSelect = (word, index) => {
            if (spellingFeedback === 'correct') return;
            const newAvailable = [...scrambleParts.available];
            newAvailable.splice(index, 1);
            const newPlaced = [...scrambleParts.placed, word];
            setScrambleParts({ available: newAvailable, placed: newPlaced });

            const currentTarget = spellingQueue[spellingIndex].en;
            const targetParts = currentTarget.split(' ');
            if (newPlaced.length === targetParts.length) {
                if (newPlaced.join(' ') === currentTarget) {
                    setSpellingFeedback('correct');
                    speak("Correct! " + (currentTarget === 'I' ? 'Eye' : currentTarget));
                    setSpellingStats(prev => ({ ...prev, correct: prev.correct + 1 }));
                } else {
                    setSpellingFeedback('wrong');
                    speak("Try again.");
                }
            }
          };
          const handleScrambleDeselect = (word, index) => {
            if (spellingFeedback === 'correct') return;
            const newPlaced = [...scrambleParts.placed];
            newPlaced.splice(index, 1);
            const newAvailable = [...scrambleParts.available, word];
            setScrambleParts({ available: newAvailable, placed: newPlaced });
            setSpellingFeedback('idle');
          };
          const nextQuestion = () => setSpellingIndex(prev => prev + 1);

          // 遊戲配對邏輯
          const handleCardClick = (index) => {
            if (isWrong) return;
            if (selectedCards.includes(index)) return;
            if (matchedPairs.includes(gameCards[index].pairId.toString())) return;

            const newSelected = [...selectedCards, index];
            setSelectedCards(newSelected);

            if (newSelected.length === 2) {
              const firstCard = gameCards[newSelected[0]];
              const secondCard = gameCards[newSelected[1]];

              if (firstCard.pairId === secondCard.pairId) {
                setMatchedPairs([...matchedPairs, firstCard.pairId.toString()]);
                setSelectedCards([]);
                if (firstCard.type === 'en') speak(firstCard.content);
                else speak(secondCard.content);
              } else {
                setIsWrong(true);
                setTimeout(() => {
                  setSelectedCards([]);
                  setIsWrong(false);
                }, 1000);
              }
            }
          };

          // --- 畫面渲染 ---

          // 1. 主畫面 (選擇年級或挑戰)
          if (mode === 'menu') {
            return (
              <div className="min-h-screen bg-sky-50 font-sans pb-20">
                <Header title="鳥嶼國小英語護照" subtitle="請選擇你的年級或挑戰" />
                
                <div className="p-6 max-w-4xl mx-auto">
                    <h2 className="text-xl font-bold text-sky-800 mb-4 flex items-center gap-2"><Icons.BookOpen /> 課程學習 (Learn & Play)</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                    {Object.keys(curriculumData).map((grade) => (
                        <button
                        key={grade}
                        onClick={() => { setCurrentGrade(grade); setMode('learn_topics'); }}
                        className="bg-white p-6 rounded-2xl shadow-lg border-b-8 border-sky-200 hover:border-sky-300 hover:translate-y-[-2px] transition-all flex flex-col items-center gap-3 group"
                        >
                        <div className="w-16 h-16 bg-sky-100 rounded-full flex items-center justify-center text-3xl group-hover:scale-110 transition-transform">
                            {grade.includes('3') ? '🥉' : grade.includes('4') ? '🍀' : grade.includes('5') ? '🖐️' : '🎓'}
                        </div>
                        <span className="text-2xl font-bold text-gray-700">{grade}</span>
                        </button>
                    ))}
                    </div>

                    <h2 className="text-xl font-bold text-orange-800 mb-4 flex items-center gap-2"><Icons.Zap /> 綜合挑戰 (Challenge)</h2>
                    <button
                        onClick={() => setMode('challenge_select')}
                        className="w-full bg-gradient-to-r from-orange-400 to-red-500 p-8 rounded-3xl shadow-xl border-b-8 border-orange-700 hover:translate-y-[-2px] transition-all flex flex-col items-center justify-center text-white group"
                    >
                        <Icons.Trophy size={48} className="mb-2 group-hover:scale-110 transition-transform animate-pulse-fast"/>
                        <span className="text-3xl font-bold tracking-widest">進入挑戰模式</span>
                        <span className="text-orange-100 mt-2">隨機 10 題測驗，考驗你的實力！</span>
                    </button>
                </div>
              </div>
            );
          }

          // 2. 選擇學習主題
          if (mode === 'learn_topics') {
            return (
              <div className="min-h-screen bg-sky-50 font-sans">
                <Header 
                  title={currentGrade} 
                  subtitle="請選擇主題 (Topic)" 
                  onBack={() => { setCurrentGrade(null); setMode('menu'); }} 
                />
                <div className="p-6 grid grid-cols-2 md:grid-cols-3 gap-4 max-w-4xl mx-auto">
                  {Object.keys(curriculumData[currentGrade]).map((topic) => (
                    <button
                      key={topic}
                      onClick={() => { setCurrentTopic(topic); setMode('learn_items'); }}
                      className="bg-white p-6 rounded-xl shadow border-b-4 border-orange-200 hover:border-orange-300 active:border-b-0 active:translate-y-1 transition-all flex flex-col items-center text-center h-full justify-center"
                    >
                      <span className="text-4xl mb-3">{getIcon(topic)}</span>
                      <span className="font-bold text-gray-700 text-lg">{topic.split('(')[0]}</span>
                      <span className="text-sm text-gray-400">{topic.split('(')[1]?.replace(')', '')}</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          }

          // 3. 學習單字與句型清單
          if (mode === 'learn_items') {
            return (
              <div className="min-h-screen bg-green-50 font-sans pb-40">
                <Header 
                  title={`${currentTopic?.split('(')[0]}`} 
                  subtitle="學習模式: 點擊聽發音 / 錄音 / 拼字" 
                  onBack={() => { setCurrentTopic(null); setMode('learn_topics'); }} 
                />
  
                <div className="p-4 max-w-3xl mx-auto space-y-4">
                  {curriculumData[currentGrade][currentTopic].map((item, idx) => (
                    <div 
                      key={idx}
                      onClick={() => speak(item.en)}
                      className={`
                        relative bg-white p-5 rounded-2xl shadow-sm border-2 cursor-pointer transition-all transform hover:scale-[1.01] active:scale-[0.99]
                        ${speakingItem === item.en ? 'border-green-400 ring-2 ring-green-100' : 'border-transparent hover:border-green-200'}
                      `}
                    >
                      <div className="flex items-center gap-5 mb-2">
                        <div className="w-16 h-16 bg-gradient-to-br from-green-100 to-green-50 rounded-2xl flex items-center justify-center text-4xl flex-shrink-0 shadow-inner">
                          {getIcon(item.en)}
                        </div>
                        <div className="flex-1">
                          <h3 className="text-2xl font-bold text-gray-800 mb-1 font-serif tracking-wide">
                            {item.en}
                          </h3>
                          <p className="text-gray-500 text-lg">
                            {item.zh}
                          </p>
                        </div>
                        <div className={`text-green-500 p-2 rounded-full hover:bg-green-50 ${speakingItem === item.en ? 'animate-bounce' : 'opacity-60'}`}>
                          <Icons.Volume2 size={28} />
                        </div>
                      </div>
                      <SpeechEvaluator targetText={item.en} />
                    </div>
                  ))}
                </div>
  
                <div className="fixed bottom-6 left-0 right-0 flex justify-center px-4 z-20 gap-3">
                  <button
                    onClick={() => initGame(currentGrade, currentTopic)}
                    className="flex-1 max-w-[200px] bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 transition-transform hover:scale-105 active:scale-95 border-b-4 border-orange-700 active:border-b-0 active:translate-y-1"
                  >
                    <Icons.Gamepad2 size={24} />
                    <span>配對遊戲</span>
                  </button>
                  
                  <button
                    onClick={() => initSpelling(currentGrade, currentTopic)}
                    className="flex-1 max-w-[200px] bg-violet-500 hover:bg-violet-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 transition-transform hover:scale-105 active:scale-95 border-b-4 border-violet-700 active:border-b-0 active:translate-y-1"
                  >
                    <Icons.Keyboard size={24} />
                    <span>拼字/重組</span>
                  </button>
                </div>
              </div>
            );
          }

          // 4. 配對遊戲
          if (mode === 'game') {
            const isWin = matchedPairs.length * 2 === gameCards.length;
            return (
              <div className="min-h-screen bg-indigo-50 font-sans pb-20">
                <Header 
                  title={`${currentTopic?.split('(')[0]} - 配對`} 
                  subtitle="配對練習 (Matching Game)" 
                  onBack={() => setMode('learn_items')} 
                />
                
                <div className="p-4 max-w-4xl mx-auto">
                  {isWin ? (
                    <div className="text-center py-12 animate-bounce-in bg-white rounded-3xl shadow-xl p-8">
                      <div className="text-8xl mb-4 text-yellow-400 mx-auto w-fit"><Icons.Trophy size={80} fill="currentColor"/></div>
                      <h2 className="text-3xl font-bold text-indigo-600 mb-4">恭喜完成!</h2>
                      <div className="flex justify-center gap-4 flex-wrap">
                        <button 
                          onClick={() => initGame(currentGrade, currentTopic)}
                          className="px-6 py-3 bg-indigo-500 text-white rounded-full font-bold shadow-lg hover:bg-indigo-600 flex items-center gap-2"
                        >
                          <Icons.RefreshCw size={20}/> 再玩一次
                        </button>
                        <button 
                          onClick={() => setMode('learn_items')}
                          className="px-6 py-3 bg-gray-200 text-gray-700 rounded-full font-bold shadow hover:bg-gray-300 flex items-center gap-2"
                        >
                          <Icons.BookOpen size={20}/> 回到學習
                        </button>
                      </div>
                    </div>
                  ) : (
                    <>
                      <div className="flex justify-between items-center mb-4 px-2">
                        <span className="font-bold text-indigo-600 bg-indigo-100 px-3 py-1 rounded-full">Score: {matchedPairs.length} / {gameCards.length / 2}</span>
                        <span className="text-sm text-gray-500">點擊英文，再點擊中文</span>
                      </div>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {gameCards.map((card, index) => {
                          const isSelected = selectedCards.includes(index);
                          const isMatched = matchedPairs.includes(card.pairId.toString());
                          const isWrongCard = isWrong && isSelected;

                          if (isMatched) return <div key={card.id} className="invisible h-24"></div>;

                          return (
                            <button
                              key={card.id}
                              onClick={() => handleCardClick(index)}
                              className={`
                                h-24 md:h-32 rounded-xl p-2 flex flex-col items-center justify-center text-center shadow-sm transition-all text-lg font-bold border-b-4 active:border-b-0 active:translate-y-1 relative overflow-hidden
                                ${isSelected ? 'bg-indigo-100 border-indigo-500' : 'bg-white border-gray-200 hover:border-indigo-300'}
                                ${isWrongCard ? 'animate-shake bg-red-100 border-red-400' : ''}
                                ${card.type === 'en' ? 'text-indigo-900' : 'text-gray-600'}
                              `}
                            >
                              <span className="z-10 relative">{card.content}</span>
                            </button>
                          );
                        })}
                      </div>
                    </>
                  )}
                </div>
              </div>
            );
          }

          // 5. 單元拼字/重組練習
          if (mode === 'spelling') {
            const showSummary = spellingIndex >= spellingQueue.length;
            if (showSummary) {
                return (
                    <div className="min-h-screen bg-violet-50 font-sans pb-20">
                        <Header title="練習結果" onBack={() => setMode('learn_items')} />
                        <div className="p-8 max-w-md mx-auto text-center mt-10 bg-white rounded-3xl shadow-xl">
                            <div className="text-6xl mb-4">📝</div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">挑戰結束!</h2>
                            <p className="text-xl text-gray-600 mb-6">
                                答對題數: <span className="text-green-600 font-bold text-3xl">{spellingStats.correct}</span> / {spellingQueue.length}
                            </p>
                            <button 
                                onClick={() => initSpelling(currentGrade, currentTopic)}
                                className="w-full py-3 bg-violet-500 text-white rounded-xl font-bold shadow mb-3 hover:bg-violet-600"
                            >
                                再試一次
                            </button>
                            <button 
                                onClick={() => setMode('learn_items')}
                                className="w-full py-3 bg-gray-200 text-gray-700 rounded-xl font-bold shadow hover:bg-gray-300"
                            >
                                回到學習
                            </button>
                        </div>
                    </div>
                )
            }

            const currentItem = spellingQueue[spellingIndex];
            const isSentenceMode = currentItem.en.includes(' ');

            return (
              <div className="min-h-screen bg-violet-50 font-sans pb-20">
                <Header 
                  title={isSentenceMode ? "句子重組 (Unscramble)" : "拼字挑戰 (Spelling)"} 
                  subtitle={`Question ${spellingIndex + 1} / ${spellingQueue.length}`}
                  onBack={() => setMode('learn_items')} 
                />
                
                <div className="p-6 max-w-lg mx-auto flex flex-col items-center gap-6 mt-4">
                    <div className="bg-white p-8 rounded-3xl shadow-lg w-full flex flex-col items-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-violet-200">
                            <div className="h-full bg-violet-500 transition-all duration-500" style={{ width: `${((spellingIndex)/spellingQueue.length)*100}%`}}></div>
                        </div>

                        <div className="text-6xl mb-4 animate-bounce-slow">{getIcon(currentItem.en)}</div>
                        <h3 className="text-2xl font-bold text-gray-800 mb-6">{currentItem.zh}</h3>
                        
                        <button
                            onClick={() => speak(currentItem.en)}
                            className="mb-6 flex items-center justify-center gap-2 w-full max-w-xs px-4 py-2 bg-sky-100 text-sky-600 rounded-full hover:bg-sky-200 transition-all mx-auto"
                        >
                            <Icons.Volume2 size={24} />
                            <span className="font-bold">聽發音 (Listen)</span>
                        </button>

                        {isSentenceMode ? (
                            <div className="w-full">
                                <div className={`
                                    min-h-[80px] w-full bg-violet-50 rounded-xl border-2 border-dashed flex flex-wrap gap-2 p-3 items-center justify-center mb-6 transition-all
                                    ${spellingFeedback === 'correct' ? 'border-green-400 bg-green-50' : 'border-violet-300'}
                                    ${spellingFeedback === 'wrong' ? 'border-red-400 bg-red-50 animate-shake' : ''}
                                `}>
                                    {scrambleParts.placed.length === 0 && <span className="text-gray-400 text-sm">請依序點擊下方的單字...</span>}
                                    {scrambleParts.placed.map((word, idx) => (
                                        <button
                                            key={idx}
                                            onClick={() => handleScrambleDeselect(word, idx)}
                                            className="bg-white px-3 py-1 rounded-lg shadow border border-violet-100 text-violet-700 font-bold hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-all"
                                        >
                                            {word}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex flex-wrap justify-center gap-3">
                                    {scrambleParts.available.map((word, idx) => (
                                        <button
                                            key={idx}
                                            onClick={() => handleScrambleSelect(word, idx)}
                                            className="bg-violet-100 px-4 py-2 rounded-lg text-violet-800 font-bold shadow-sm hover:bg-violet-200 hover:scale-105 active:scale-95 transition-all"
                                        >
                                            {word}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="w-full">
                                <div className="bg-violet-50 px-6 py-3 rounded-xl mb-6 border border-violet-100">
                                    <p className="text-sm text-violet-400 font-bold uppercase tracking-wider mb-1 text-center">HINT</p>
                                    <p className="text-3xl font-mono text-violet-600 font-bold tracking-widest text-center">
                                        {getSpellingHint(currentItem.en)}
                                    </p>
                                </div>
                                <div className="w-full relative">
                                    <input 
                                        type="text" 
                                        value={userSpelling}
                                        onChange={(e) => {
                                            if (spellingFeedback !== 'correct') setUserSpelling(e.target.value);
                                        }}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') {
                                                if (spellingFeedback === 'idle') checkWordSpelling();
                                                else if (spellingFeedback === 'correct') nextQuestion();
                                            }
                                        }}
                                        placeholder="Type English..."
                                        className={`
                                            w-full p-4 text-center text-xl border-2 rounded-xl outline-none transition-all font-bold
                                            ${spellingFeedback === 'idle' ? 'border-gray-300 focus:border-violet-500' : ''}
                                            ${spellingFeedback === 'correct' ? 'border-green-500 bg-green-50 text-green-700' : ''}
                                            ${spellingFeedback === 'wrong' ? 'border-red-500 bg-red-50 text-red-700 animate-shake' : ''}
                                        `}
                                        disabled={spellingFeedback === 'correct'}
                                    />
                                </div>
                            </div>
                        )}

                        <div className="mt-8 w-full">
                            {spellingFeedback === 'correct' ? (
                                 <button 
                                    onClick={nextQuestion}
                                    className="w-full py-4 bg-green-500 text-white rounded-xl font-bold text-lg shadow-lg hover:bg-green-600 active:scale-95 transition-all flex items-center justify-center gap-2"
                                >
                                    下一題 (Next)
                                </button>
                            ) : (
                                !isSentenceMode ? (
                                     <button 
                                        onClick={checkWordSpelling}
                                        className="w-full py-4 bg-violet-600 text-white rounded-xl font-bold text-lg shadow-lg hover:bg-violet-700 active:scale-95 transition-all"
                                    >
                                        檢查答案 (Check)
                                    </button>
                                ) : (
                                    spellingFeedback === 'wrong' && (
                                        <button 
                                            onClick={() => {
                                                const parts = currentItem.en.split(' ');
                                                setScrambleParts({ available: parts.sort(() => Math.random() - 0.5), placed: [] });
                                                setSpellingFeedback('idle');
                                            }}
                                            className="w-full py-3 bg-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-300 flex items-center justify-center gap-2"
                                        >
                                            <Icons.RotateCcw size={18}/> 重置 (Reset)
                                        </button>
                                    )
                                )
                            )}
                        </div>
                    </div>
                </div>
              </div>
            );
          }

          // 6. 綜合挑戰：選擇年級
          if (mode === 'challenge_select') {
              return (
                  <div className="min-h-screen bg-orange-50 font-sans">
                      <Header title="綜合挑戰" subtitle="選擇你要挑戰的範圍" onBack={() => setMode('menu')} />
                      <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                        <button
                            onClick={() => initChallenge('ALL')}
                            className="bg-gradient-to-r from-red-500 to-orange-500 text-white p-8 rounded-2xl shadow-lg border-b-8 border-red-700 hover:translate-y-[-2px] transition-all flex flex-col items-center gap-3 md:col-span-2"
                        >
                            <Icons.Zap size={40} className="animate-pulse" />
                            <span className="text-2xl font-bold">全部年級大挑戰 (All Grades)</span>
                            <span className="text-red-100">隨機抽取所有範圍的單字與句型</span>
                        </button>
                        {Object.keys(curriculumData).map((grade) => (
                            <button
                                key={grade}
                                onClick={() => initChallenge(grade)}
                                className="bg-white p-6 rounded-2xl shadow border-b-4 border-orange-200 hover:border-orange-400 hover:translate-y-[-2px] transition-all flex flex-col items-center gap-2 text-orange-800"
                            >
                                <span className="text-xl font-bold">{grade}</span>
                                <span className="text-sm text-gray-500">僅限此年級範圍</span>
                            </button>
                        ))}
                      </div>
                  </div>
              )
          }

          // 7. 綜合挑戰：遊戲中
          if (mode === 'challenge_play') {
              if (challengeIndex >= 10) {
                  // 結算畫面
                  return (
                    <div className="min-h-screen bg-orange-50 font-sans pb-20">
                        <Header title="挑戰結束" onBack={() => setMode('challenge_select')} />
                        <div className="p-8 max-w-md mx-auto text-center mt-10 bg-white rounded-3xl shadow-xl border-4 border-orange-100">
                            <div className="text-6xl mb-4 text-yellow-500 animate-bounce"><Icons.Trophy size={80} fill="currentColor" className="mx-auto" /></div>
                            <h2 className="text-3xl font-bold text-orange-600 mb-2">Challenge Complete!</h2>
                            <p className="text-gray-600 mb-6 font-bold">挑戰範圍: {challengeGrade === 'ALL' ? '全部年級' : challengeGrade}</p>
                            
                            <div className="bg-orange-50 rounded-xl p-6 mb-8">
                                <p className="text-xl text-gray-700 mb-2">你的得分</p>
                                <p className="text-5xl font-bold text-orange-500">{challengeScore} <span className="text-2xl text-gray-400">/ 10</span></p>
                            </div>

                            <button 
                                onClick={() => initChallenge(challengeGrade)}
                                className="w-full py-4 bg-orange-500 text-white rounded-xl font-bold text-lg shadow-lg mb-3 hover:bg-orange-600 transition-colors"
                            >
                                再挑戰一次
                            </button>
                            <button 
                                onClick={() => setMode('menu')}
                                className="w-full py-4 bg-gray-200 text-gray-700 rounded-xl font-bold text-lg shadow hover:bg-gray-300 transition-colors"
                            >
                                回到首頁
                            </button>
                        </div>
                    </div>
                  );
              }

              const q = challengeQuestions[challengeIndex];
              const isSentence = q.en.includes(' ');

              return (
                <div className="min-h-screen bg-slate-900 font-sans text-slate-100 pb-20 flex flex-col">
                    <div className="p-4 flex items-center justify-between bg-slate-800 shadow-md">
                        <button onClick={() => setMode('challenge_select')} className="text-slate-400 hover:text-white">
                            <Icons.X size={28} />
                        </button>
                        <div className="font-bold text-xl text-orange-400">Question {challengeIndex + 1} / 10</div>
                        <div className="w-8"></div> {/* Balance flex */}
                    </div>

                    {/* Progress Bar */}
                    <div className="w-full h-1.5 bg-slate-700">
                        <div className="h-full bg-gradient-to-r from-orange-400 to-red-500 transition-all duration-300" style={{ width: `${(challengeIndex / 10) * 100}%`}}></div>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center p-6">
                        <div className="bg-slate-800 w-full max-w-lg rounded-3xl p-8 shadow-2xl flex flex-col items-center relative border border-slate-700">
                            
                            {/* 題型標籤 */}
                            <div className={`absolute -top-4 px-4 py-1 rounded-full font-bold text-sm shadow-lg border-2 border-slate-800 ${q.type === 'speak' ? 'bg-sky-400 text-sky-900' : 'bg-violet-400 text-violet-900'}`}>
                                {q.type === 'speak' ? '🗣️ 口說挑戰 (Speak)' : '📝 聽寫挑戰 (Spell)'}
                            </div>

                            <div className="text-6xl mb-6 mt-4">{getIcon(q.en)}</div>
                            <h3 className="text-3xl font-bold text-white mb-8 text-center">{q.zh}</h3>

                            {/* ====== 口說題型 ====== */}
                            {q.type === 'speak' && (
                                <div className="w-full flex flex-col items-center">
                                    <p className="text-2xl text-sky-300 font-bold mb-6 text-center">{q.en}</p>
                                    <div className="w-full bg-slate-700 rounded-xl p-4">
                                        <SpeechEvaluator 
                                            targetText={q.en} 
                                            onSuccess={() => {
                                                if (chFeedback !== 'correct') {
                                                    setChFeedback('correct');
                                                    setTimeout(() => nextChallengeQuestion(true), 1500);
                                                }
                                            }}
                                        />
                                    </div>
                                </div>
                            )}

                            {/* ====== 拼寫題型 ====== */}
                            {q.type === 'spell' && (
                                <div className="w-full flex flex-col items-center">
                                    <button
                                        onClick={() => speak(q.en)}
                                        className="mb-6 flex items-center justify-center gap-2 w-full max-w-xs px-4 py-3 bg-violet-600/30 text-violet-300 rounded-full hover:bg-violet-600/50 transition-all border border-violet-500/30"
                                    >
                                        <Icons.Volume2 size={24} />
                                        <span className="font-bold">聽發音提示</span>
                                    </button>

                                    {isSentence ? (
                                        <div className="w-full">
                                            <div className={`
                                                min-h-[80px] w-full bg-slate-900 rounded-xl border-2 border-dashed flex flex-wrap gap-2 p-3 items-center justify-center mb-6 transition-all
                                                ${chFeedback === 'correct' ? 'border-green-500 bg-green-900/30' : 'border-slate-600'}
                                                ${chFeedback === 'wrong' ? 'border-red-500 bg-red-900/30 animate-shake' : ''}
                                            `}>
                                                {chScrambleParts.placed.length === 0 && <span className="text-slate-500 text-sm">點擊下方單字重組句子</span>}
                                                {chScrambleParts.placed.map((word, idx) => (
                                                    <button key={idx} onClick={() => handleChallengeScrambleDeselect(word, idx)} className="bg-slate-700 px-3 py-1 rounded-lg text-white font-bold hover:bg-red-500/50 transition-all">
                                                        {word}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="flex flex-wrap justify-center gap-3">
                                                {chScrambleParts.available.map((word, idx) => (
                                                    <button key={idx} onClick={() => handleChallengeScrambleSelect(word, idx)} className="bg-violet-600 px-4 py-2 rounded-lg text-white font-bold shadow-sm hover:bg-violet-500 transition-all">
                                                        {word}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="w-full relative">
                                            <div className="bg-slate-900/50 px-6 py-3 rounded-xl mb-6 border border-slate-700">
                                                <p className="text-sm text-slate-500 font-bold uppercase tracking-wider mb-1 text-center">HINT</p>
                                                <p className="text-3xl font-mono text-violet-400 font-bold tracking-widest text-center">
                                                    {getSpellingHint(q.en)}
                                                </p>
                                            </div>
                                            <input 
                                                type="text" 
                                                value={chUserSpelling}
                                                onChange={(e) => {
                                                    if (chFeedback !== 'correct') setChUserSpelling(e.target.value);
                                                }}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter' && chFeedback === 'idle') checkChallengeSpelling();
                                                }}
                                                placeholder="輸入英文單字..."
                                                className={`
                                                    w-full p-4 text-center text-xl bg-slate-900 border-2 rounded-xl outline-none transition-all font-bold text-white
                                                    ${chFeedback === 'idle' ? 'border-slate-600 focus:border-violet-500' : ''}
                                                    ${chFeedback === 'correct' ? 'border-green-500 text-green-400' : ''}
                                                    ${chFeedback === 'wrong' ? 'border-red-500 text-red-400 animate-shake' : ''}
                                                `}
                                                disabled={chFeedback === 'correct'}
                                                autoFocus
                                            />
                                            {chFeedback === 'idle' && (
                                                <button onClick={checkChallengeSpelling} className="mt-4 w-full py-3 bg-violet-600 text-white rounded-xl font-bold hover:bg-violet-500 transition-colors">
                                                    檢查答案
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* 成功動畫遮罩 */}
                            {chFeedback === 'correct' && (
                                <div className="absolute inset-0 bg-green-500/20 rounded-3xl flex items-center justify-center backdrop-blur-sm z-10">
                                    <div className="bg-green-500 text-white px-6 py-3 rounded-full font-bold text-2xl shadow-xl flex items-center gap-2 animate-bounce">
                                        <Icons.Check /> Correct!
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 放棄此題按鈕 */}
                        {chFeedback !== 'correct' && (
                            <button 
                                onClick={() => nextChallengeQuestion(false)}
                                className="mt-8 text-slate-500 font-bold hover:text-slate-300 transition-colors"
                            >
                                不會這題，跳過 (Skip)
                            </button>
                        )}
                    </div>
                </div>
              );
          }

          // Fallback (Should not reach here based on states)
          return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
